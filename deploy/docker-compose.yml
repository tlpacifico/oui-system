services:
  caddy:
    image: caddy:2-alpine
    container_name: oui-caddy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  oui-system:
    image: ghcr.io/tlpacifico/oui-system:latest
    container_name: oui-system
    restart: unless-stopped
    network_mode: host

    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Production"

      # Connection string — PostgreSQL instalado na VPS (localhost)
      ConnectionStrings__DefaultConnection: "${DB_CONNECTION_STRING}"

      # Firebase
      Firebase__ProjectId: "${FIREBASE_PROJECT_ID}"
      Firebase__ServiceAccountPath: "/app/secrets/firebase-admin.json"

      # CORS — storefront domain(s), comma-separated
      Cors__AllowedOrigins: "https://ouicircular.com,https://www.ouicircular.com"

      # Email (MailKit)
      Email__Host: "${EMAIL_HOST}"
      Email__Port: "${EMAIL_PORT}"
      Email__Username: "${EMAIL_USERNAME}"
      Email__Password: "${EMAIL_PASSWORD}"
      Email__From: "${EMAIL_FROM}"

    volumes:
      # Fotos dos items — persistir fora do container
      - oui-uploads:/app/wwwroot/uploads
      # Service account do Firebase Admin — escrito pelo workflow de deploy
      - ./secrets/firebase-admin.json:/app/secrets/firebase-admin.json:ro

    # Healthcheck básico
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  oui-uploads:
    driver: local
  caddy-data:
  caddy-config:
