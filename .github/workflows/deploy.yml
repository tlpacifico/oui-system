name: Deploy OUI System

# Trigger manual — vai ao GitHub > Actions > Deploy OUI System > Run workflow
on:
  workflow_dispatch:
    inputs:
      run_migrations:
        description: 'Aplicar migrations EF Core antes do deploy?'
        type: boolean
        default: false
      skip_tests:
        description: 'Pular testes de integração? (para hotfixes urgentes)'
        type: boolean
        default: false
      image_tag:
        description: 'Tag da imagem (default: latest)'
        type: string
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/oui-system

jobs:
  # ─────────────────────────────────────────────
  # Job 1 — Build e push da imagem Docker
  # ─────────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # necessário para push no ghcr.io

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      short_sha: ${{ steps.sha.outputs.short }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags e labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Setup Docker Buildx (build cache)
        uses: docker/setup-buildx-action@v3

      - name: Build e Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
            FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}
            FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
            FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
            FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
            FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
            FIREBASE_MEASUREMENT_ID=${{ secrets.FIREBASE_MEASUREMENT_ID }}

  # ─────────────────────────────────────────────
  # Job 2 — Testes de integração
  # ─────────────────────────────────────────────
  test:
    name: Integration Tests
    if: ${{ inputs.skip_tests != true }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Run integration tests
        run: dotnet test tests/shs.Api.IntegrationTests

  # ─────────────────────────────────────────────
  # Job 3 — Deploy na VPS
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy VPS
    needs: [build, test]
    if: always() && needs.build.result == 'success' && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copiar Caddyfile para VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy/Caddyfile,deploy/docker-compose.yml"
          target: "/opt/oui-system"
          strip_components: 1

      - name: Aplicar migrations EF Core
        if: ${{ inputs.run_migrations == true }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "A aplicar migrations..."
            docker run --rm \
              --network host \
              -e ConnectionStrings__DefaultConnection="${{ secrets.DB_CONNECTION_STRING }}" \
              -e Firebase__ProjectId="${{ secrets.FIREBASE_PROJECT_ID }}" \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
              dotnet shs.Api.dll --ef-migrate
            echo "Migrations concluídas."

      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DB_CONNECTION_STRING,FIREBASE_PROJECT_ID,FIREBASE_SERVICE_ACCOUNT_JSON,EMAIL_HOST,EMAIL_PORT,EMAIL_USERNAME,EMAIL_PASSWORD,EMAIL_FROM
          script: |
            cd /opt/oui-system

            # Escrever .env com valores dos GitHub Secrets
            printf '%s\n' \
              "DB_CONNECTION_STRING=${DB_CONNECTION_STRING}" \
              "FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}" \
              "EMAIL_HOST=${EMAIL_HOST}" \
              "EMAIL_PORT=${EMAIL_PORT}" \
              "EMAIL_USERNAME=${EMAIL_USERNAME}" \
              "EMAIL_PASSWORD=${EMAIL_PASSWORD}" \
              "EMAIL_FROM=${EMAIL_FROM}" \
              > .env

            # Service account do Firebase Admin — montado como volume read-only no container
            mkdir -p secrets
            printf '%s' "${FIREBASE_SERVICE_ACCOUNT_JSON}" > secrets/firebase-admin.json
            chmod 644 secrets/firebase-admin.json

            # Pull nova imagem
            docker compose pull

            # Reiniciar containers (Caddy + oui-system)
            docker compose up -d

            # Remover imagens antigas
            docker image prune -f

            echo "Deploy concluído: ${{ needs.build.outputs.short_sha }}"
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}

      - name: Verificar health
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sleep 10
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' oui-system 2>/dev/null || echo "running")
            echo "Container status: $STATUS"
            docker compose -f /opt/oui-system/docker-compose.yml ps
