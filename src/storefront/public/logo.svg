<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Circle background -->
  <circle cx="100" cy="100" r="98" fill="#d4c5a9" stroke="#c4b08e" stroke-width="2"/>

  <!-- Leaf decoration (top right) -->
  <g transform="translate(130, 48) rotate(25)">
    <path d="M0,0 C8,-18 25,-28 40,-25 C28,-12 15,0 0,0Z" fill="#8fae7e" opacity="0.85"/>
    <path d="M0,0 C10,-14 22,-22 34,-20" stroke="#6b7c5e" stroke-width="1" fill="none" opacity="0.5"/>
  </g>

  <!-- Small leaf (left) -->
  <g transform="translate(50, 55) rotate(-15) scale(0.6)">
    <path d="M0,0 C8,-18 25,-28 40,-25 C28,-12 15,0 0,0Z" fill="#8fae7e" opacity="0.7"/>
  </g>

  <!-- "Oui" text -->
  <text x="100" y="108" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="bold" fill="#5c6b4f" letter-spacing="3">Oui</text>

  <!-- "Circular" text -->
  <text x="100" y="138" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="#6b7c5e" letter-spacing="5">CIRCULAR</text>

  <!-- Decorative line -->
  <line x1="60" y1="148" x2="140" y2="148" stroke="#8fae7e" stroke-width="1.5" opacity="0.6"/>
</svg>
